<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViewTube</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root {
      --bg:#0f0f0f; --bg2:#181818; --bg3:#212121;
      --hover:#3d3d3d; --txt:#fff; --txt2:#aaa; --txt3:#717171;
      --red:#ff0000; --red2:#cc0000; --border:#303030;
      --sidebar:240px; --header:56px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

    /* ── HEADER ── */
    header{
      position:fixed;top:0;left:0;right:0;z-index:200;
      height:var(--header);background:var(--bg);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 16px;gap:12px
    }
    .h-left{display:flex;align-items:center;gap:12px;min-width:180px}
    .menu-btn,.icon-btn{
      background:none;border:none;color:var(--txt);cursor:pointer;
      width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      transition:background .15s
    }
    .menu-btn:hover,.icon-btn:hover{background:var(--hover)}
    .logo{display:flex;align-items:center;gap:5px;text-decoration:none;cursor:pointer}
    .logo-icon{
      width:34px;height:24px;background:var(--red);border-radius:6px;
      display:flex;align-items:center;justify-content:center
    }
    .logo-icon svg{width:14px;height:14px;fill:#fff}
    .logo-text{font-size:19px;font-weight:700;color:var(--txt);letter-spacing:-.5px}
    .search-wrap{flex:1;max-width:620px;margin:0 auto;display:flex;gap:8px;align-items:center}
    .search-form{flex:1;display:flex;height:38px}
    .search-input{
      flex:1;background:var(--bg2);border:1px solid var(--border);
      border-right:none;border-radius:19px 0 0 19px;
      padding:0 18px;color:var(--txt);font-size:15px;outline:none;
      transition:border-color .2s,background .2s
    }
    .search-input:focus{border-color:#3284cc;background:#121212}
    .search-input::placeholder{color:var(--txt3)}
    .search-btn{
      background:var(--bg2);border:1px solid var(--border);border-left:none;
      border-radius:0 19px 19px 0;padding:0 18px;color:var(--txt);
      cursor:pointer;display:flex;align-items:center;transition:background .15s
    }
    .search-btn:hover{background:var(--hover)}
    .h-right{margin-left:auto;display:flex;align-items:center;gap:4px}

    /* ── SIDEBAR ── */
    .layout{display:flex;margin-top:var(--header)}
    aside{
      position:fixed;top:var(--header);left:0;bottom:0;
      width:var(--sidebar);background:var(--bg);overflow-y:auto;
      padding:8px 0;transition:transform .25s ease;z-index:100;scrollbar-width:none
    }
    aside::-webkit-scrollbar{display:none}
    aside.hidden{transform:translateX(-100%)}
    .nav-sec{padding:6px 0;border-bottom:1px solid var(--border)}
    .nav-sec:last-child{border:none}
    .nav-item{
      display:flex;align-items:center;gap:24px;
      padding:10px 20px;cursor:pointer;border-radius:10px;margin:0 6px;
      transition:background .15s;color:var(--txt);text-decoration:none;font-size:14px
    }
    .nav-item:hover{background:var(--hover)}
    .nav-item.active{background:var(--bg3);font-weight:500}
    .nav-item .material-icons{font-size:22px}

    /* ── MAIN ── */
    main{margin-left:var(--sidebar);flex:1;min-height:calc(100vh - var(--header));transition:margin-left .25s ease}
    main.full{margin-left:0}
    .chips{
      position:sticky;top:var(--header);z-index:99;background:var(--bg);padding:10px 20px;
      display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)
    }
    .chips::-webkit-scrollbar{display:none}
    .chip{
      flex-shrink:0;padding:6px 14px;border-radius:8px;background:var(--bg3);color:var(--txt);
      font-size:14px;font-weight:500;cursor:pointer;border:none;
      transition:background .15s;white-space:nowrap;font-family:inherit
    }
    .chip:hover{background:var(--hover)}
    .chip.on{background:var(--txt);color:var(--bg)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding:20px}
    .results-hdr{padding:14px 20px 2px;font-size:15px;color:var(--txt2);border-bottom:1px solid var(--border)}

    /* ── CARD ── */
    .card{cursor:pointer;border-radius:12px;overflow:hidden}
    .card:hover .thumb-img{transform:scale(1.03)}
    .thumb-wrap{position:relative;width:100%;padding-bottom:56.25%;background:var(--bg3);border-radius:12px;overflow:hidden}
    .thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .2s}
    .card-info{display:flex;gap:12px;padding:10px 4px 4px}
    .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
    .meta{flex:1;min-width:0}
    .vtitle{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .vchan{font-size:13px;color:var(--txt2);margin-bottom:2px}
    .vstats{font-size:13px;color:var(--txt3)}

    /* ── MODAL ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;overflow-y:auto}
    .overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:30px 16px}
    .modal{background:var(--bg2);border-radius:16px;width:100%;max-width:920px;overflow:hidden;position:relative}
    .player-box{position:relative;padding-bottom:56.25%;background:#000}
    .player-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .modal-close{
      position:absolute;top:12px;right:12px;background:rgba(0,0,0,.75);border:none;color:#fff;
      width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
      z-index:10;transition:background .15s
    }
    .modal-close:hover{background:rgba(0,0,0,.95)}
    .modal-body{padding:18px 22px 24px}
    .modal-title{font-size:19px;font-weight:600;line-height:1.35;margin-bottom:12px}
    .modal-row{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
      padding-bottom:14px;border-bottom:1px solid var(--border)
    }
    .modal-stats{color:var(--txt2);font-size:14px}
    .act-row{display:flex;gap:8px;flex-wrap:wrap}
    .act-btn{
      display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;
      background:var(--bg3);border:none;color:var(--txt);font-size:14px;font-weight:500;
      cursor:pointer;transition:background .15s;font-family:inherit
    }
    .act-btn:hover{background:var(--hover)}
    .act-btn .material-icons{font-size:20px}
    .modal-chan{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
    .chan-av{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700}
    .chan-name{font-size:15px;font-weight:500}
    .chan-subs{font-size:13px;color:var(--txt2);margin-top:2px}
    .sub-btn{
      margin-left:auto;padding:10px 18px;border-radius:20px;background:var(--txt);color:var(--bg);
      border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s
    }
    .sub-btn:hover{background:#ccc}
    .desc{
      margin-top:14px;background:var(--bg3);border-radius:12px;padding:14px;
      font-size:14px;line-height:1.65;color:var(--txt2);white-space:pre-wrap;
      max-height:90px;overflow:hidden;cursor:pointer;position:relative;transition:max-height .3s
    }
    .desc.open{max-height:600px}
    .desc::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
      background:linear-gradient(transparent,var(--bg3));pointer-events:none;transition:opacity .3s
    }
    .desc.open::after{opacity:0}

    /* ── SETTINGS MODAL ── */
    .settings-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:800;align-items:center;justify-content:center
    }
    .settings-overlay.open{display:flex}
    .settings-box{
      background:var(--bg2);border-radius:20px;padding:36px 40px;
      max-width:440px;width:100%;position:relative
    }
    .settings-box h2{font-size:20px;font-weight:600;margin-bottom:6px}
    .settings-box p{color:var(--txt2);font-size:13px;line-height:1.6;margin-bottom:20px}
    .settings-box a{color:#3284cc}
    .s-inp{
      width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:12px 14px;color:var(--txt);font-size:14px;outline:none;font-family:inherit;
      transition:border-color .2s;margin-bottom:12px
    }
    .s-inp:focus{border-color:var(--red)}
    .s-save{
      width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;
      font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit
    }
    .s-save:hover{background:var(--red2)}
    .s-close{
      position:absolute;top:14px;right:14px;background:none;border:none;
      color:var(--txt2);cursor:pointer;font-size:22px;line-height:1
    }

    /* ── STATES ── */
    .loader{display:flex;justify-content:center;padding:80px 0;grid-column:1/-1}
    .spinner{width:46px;height:46px;border:4px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:70px 20px;grid-column:1/-1}
    .empty .material-icons{font-size:64px;color:var(--txt3);display:block;margin-bottom:14px}
    .empty h3{font-size:18px;font-weight:500;margin-bottom:6px}
    .empty p{color:var(--txt2);font-size:14px;margin-top:4px}
    .empty .retry-btn{
      margin-top:16px;padding:10px 22px;background:var(--red);color:#fff;
      border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit
    }
    .skel{animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .sk-thumb{width:100%;padding-bottom:56.25%;background:var(--bg3);border-radius:12px}
    .sk-line{background:var(--bg3);border-radius:4px}

    @media(max-width:760px){
      aside{transform:translateX(-100%)}
      aside.visible{transform:translateX(0)}
      main{margin-left:0!important}
      .grid{grid-template-columns:1fr;padding:10px}
      .logo-text{display:none}
      .act-row .act-btn span:not(.material-icons){display:none}
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="h-left">
    <button class="menu-btn" onclick="toggleSidebar()"><span class="material-icons">menu</span></button>
    <div class="logo" onclick="goHome()">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <span class="logo-text">ViewTube</span>
    </div>
  </div>
  <div class="search-wrap">
    <form class="search-form" onsubmit="doSearch(event)">
      <input id="searchBox" class="search-input" type="text" placeholder="Search" autocomplete="off" />
      <button class="search-btn" type="submit"><span class="material-icons">search</span></button>
    </form>
  </div>
  <div class="h-right">
    <button class="icon-btn" title="API Key Settings" onclick="openSettings()">
      <span class="material-icons">settings</span>
    </button>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="layout">
  <aside id="sidebar">
    <div class="nav-sec">
      <a class="nav-item active" id="navHome" onclick="goHome();activate(this)">
        <span class="material-icons">home</span><span>Home</span>
      </a>
      <a class="nav-item" onclick="runQuery('trending today');activate(this)">
        <span class="material-icons">local_fire_department</span><span>Trending</span>
      </a>
      <a class="nav-item" onclick="runQuery('popular music videos 2025');activate(this)">
        <span class="material-icons">music_note</span><span>Music</span>
      </a>
      <a class="nav-item" onclick="runQuery('gaming highlights 2025');activate(this)">
        <span class="material-icons">sports_esports</span><span>Gaming</span>
      </a>
    </div>
    <div class="nav-sec">
      <a class="nav-item" onclick="runQuery('world news today');activate(this)">
        <span class="material-icons">article</span><span>News</span>
      </a>
      <a class="nav-item" onclick="runQuery('sports highlights goals 2025');activate(this)">
        <span class="material-icons">sports_soccer</span><span>Sports</span>
      </a>
      <a class="nav-item" onclick="runQuery('programming tutorials');activate(this)">
        <span class="material-icons">school</span><span>Learning</span>
      </a>
      <a class="nav-item" onclick="runQuery('movie trailers 2025');activate(this)">
        <span class="material-icons">movie</span><span>Movies</span>
      </a>
    </div>
    <div class="nav-sec">
      <a class="nav-item" onclick="runQuery('cooking recipes easy');activate(this)">
        <span class="material-icons">restaurant</span><span>Cooking</span>
      </a>
      <a class="nav-item" onclick="runQuery('travel vlog destinations');activate(this)">
        <span class="material-icons">flight</span><span>Travel</span>
      </a>
      <a class="nav-item" onclick="runQuery('workout fitness gym');activate(this)">
        <span class="material-icons">fitness_center</span><span>Fitness</span>
      </a>
    </div>
  </aside>

  <main id="main">
    <div class="chips" id="chips">
      <button class="chip on" onclick="goHome();chipOn(this)">All</button>
      <button class="chip" onclick="runQuery('music');chipOn(this)">Music</button>
      <button class="chip" onclick="runQuery('gaming');chipOn(this)">Gaming</button>
      <button class="chip" onclick="runQuery('news today');chipOn(this)">News</button>
      <button class="chip" onclick="runQuery('comedy');chipOn(this)">Comedy</button>
      <button class="chip" onclick="runQuery('tech reviews');chipOn(this)">Tech</button>
      <button class="chip" onclick="runQuery('cooking');chipOn(this)">Cooking</button>
      <button class="chip" onclick="runQuery('sports');chipOn(this)">Sports</button>
      <button class="chip" onclick="runQuery('travel vlog');chipOn(this)">Travel</button>
      <button class="chip" onclick="runQuery('fitness workout');chipOn(this)">Fitness</button>
      <button class="chip" onclick="runQuery('science documentary');chipOn(this)">Science</button>
      <button class="chip" onclick="runQuery('movie trailers');chipOn(this)">Movies</button>
    </div>
    <div id="resultsHdr" class="results-hdr" style="display:none"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- ── VIDEO MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="player-box" id="playerBox"></div>
    <button class="modal-close" onclick="closeModal()"><span class="material-icons">close</span></button>
    <div class="modal-body">
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-row">
        <div class="modal-stats" id="mStats"></div>
        <div class="act-row">
          <button class="act-btn" id="likeBtn">
            <span class="material-icons">thumb_up</span><span id="likeLabel">Like</span>
          </button>
          <button class="act-btn"><span class="material-icons">thumb_down</span></button>
          <button class="act-btn" onclick="shareVideo()">
            <span class="material-icons">share</span><span>Share</span>
          </button>
          <button class="act-btn" onclick="openOnYT()">
            <span class="material-icons">open_in_new</span><span>YouTube</span>
          </button>
        </div>
      </div>
      <div class="modal-chan" id="mChan"></div>
      <div class="desc" id="mDesc" onclick="this.classList.toggle('open')"></div>
    </div>
  </div>
</div>

<!-- ── SETTINGS ── -->
<div class="settings-overlay" id="settingsOverlay" onclick="settingsOverlayClick(event)">
  <div class="settings-box" id="settingsBox">
    <button class="s-close" onclick="closeSettings()">✕</button>
    <h2>API Key Settings</h2>
    <p>Using the YouTube Data API v3. <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank">Get a key →</a></p>
    <input id="keyInput" class="s-inp" type="text" placeholder="AIzaSy…" autocomplete="off" />
    <button class="s-save" onclick="saveKey()">Save & Reload</button>
  </div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────
  const DEFAULT_KEY = 'AIzaSyCi7INFYXUr6uIZN6CE1V4jsA9LIqumkA8';
  let API_KEY = localStorage.getItem('vt_key') || DEFAULT_KEY;
  let sidebarOpen = true;
  let currentVideoId = '';
  let lastAction = null; // for retry

  // ── BOOT ───────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', goHome);

  // ── SETTINGS ──────────────────────────────────────────────────
  function openSettings() {
    document.getElementById('keyInput').value = API_KEY;
    document.getElementById('settingsOverlay').classList.add('open');
  }
  function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
  function settingsOverlayClick(e) { if (e.target === document.getElementById('settingsOverlay')) closeSettings(); }
  function saveKey() {
    const v = document.getElementById('keyInput').value.trim();
    if (!v) return;
    API_KEY = v;
    localStorage.setItem('vt_key', v);
    closeSettings();
    if (lastAction) lastAction();
    else goHome();
  }

  // ── SIDEBAR ───────────────────────────────────────────────────
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    const sb = document.getElementById('sidebar');
    const mn = document.getElementById('main');
    if (window.innerWidth < 760) {
      sb.classList.toggle('visible', sidebarOpen);
    } else {
      sb.classList.toggle('hidden', !sidebarOpen);
      mn.classList.toggle('full', !sidebarOpen);
    }
  }
  function activate(el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
  function chipOn(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
  }

  // ── FETCH ─────────────────────────────────────────────────────
  async function yt(url) {
    let res;
    try {
      res = await fetch(url);
    } catch (netErr) {
      // Network-level failure (offline, CORS, etc.)
      throw Object.assign(new Error('Network error — make sure you are online and the file is opened in a browser.'), { isNetwork: true });
    }
    const data = await res.json();
    if (data.error) {
      const msg = data.error.message || 'YouTube API error';
      const code = data.error.code || res.status;
      throw Object.assign(new Error(`API error ${code}: ${msg}`), { apiError: true, code });
    }
    return data;
  }

  // ── FORMAT ────────────────────────────────────────────────────
  function fmtN(n) {
    n = parseInt(n, 10);
    if (isNaN(n)) return '';
    if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
    return ''+n;
  }
  function fmtViews(n) { const s = fmtN(n); return s ? s+' views' : ''; }
  function timeAgo(d) {
    const s = Math.floor((Date.now()-new Date(d))/1000);
    if (s<60) return s+'s ago';
    const m=Math.floor(s/60); if(m<60) return m+'m ago';
    const h=Math.floor(m/60); if(h<24) return h+'h ago';
    const dy=Math.floor(h/24); if(dy<30) return dy+'d ago';
    const mo=Math.floor(dy/30); if(mo<12) return mo+' mo ago';
    return Math.floor(mo/12)+' yr ago';
  }
  function ini(s) { return (s||'?').charAt(0).toUpperCase(); }
  const COLORS=['#e53935','#8e24aa','#1e88e5','#00897b','#f4511e','#6d4c41','#546e7a','#fb8c00'];
  function aColor(s) {
    let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
    return COLORS[Math.abs(h)%COLORS.length];
  }

  // ── SKELETONS ─────────────────────────────────────────────────
  function skeletons(n=16) {
    document.getElementById('resultsHdr').style.display='none';
    document.getElementById('grid').innerHTML = Array.from({length:n},()=>`
      <div class="skel">
        <div class="sk-thumb"></div>
        <div class="card-info">
          <div class="sk-line" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1">
            <div class="sk-line" style="height:14px;width:92%;margin-bottom:6px;"></div>
            <div class="sk-line" style="height:12px;width:65%;margin-bottom:4px;"></div>
            <div class="sk-line" style="height:12px;width:50%;"></div>
          </div>
        </div>
      </div>`).join('');
  }

  function showErr(msg, retry) {
    lastAction = retry || null;
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <span class="material-icons">error_outline</span>
        <h3>Something went wrong</h3>
        <p>${msg}</p>
        ${retry ? '<button class="retry-btn" onclick="lastAction && lastAction()">Try again</button>' : ''}
      </div>`;
  }

  // ── RENDER ────────────────────────────────────────────────────
  function render(videos, hdr='') {
    const grid = document.getElementById('grid');
    const hdrEl = document.getElementById('resultsHdr');
    grid.innerHTML = '';
    hdrEl.style.display = hdr ? 'block' : 'none';
    if (hdr) hdrEl.textContent = hdr;

    if (!videos.length) {
      grid.innerHTML = `<div class="empty"><span class="material-icons">search_off</span><h3>No results</h3><p>Try a different search term.</p></div>`;
      return;
    }
    videos.forEach(v => {
      const sn = v.snippet||{};
      const st = v.statistics||{};
      const id = typeof v.id==='string' ? v.id : (v.id?.videoId||'');
      if (!id) return;
      const thumb = sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url || '';
      const title = sn.title || '(no title)';
      const chan = sn.channelTitle || '';
      const pub = sn.publishedAt || '';
      const bg = aColor(chan);

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb-wrap">
          <img class="thumb-img" src="${thumb}" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="card-info">
          <div class="avatar" style="background:${bg}">${ini(chan)}</div>
          <div class="meta">
            <div class="vtitle">${title}</div>
            <div class="vchan">${chan}</div>
            <div class="vstats">${[fmtViews(st.viewCount), pub?timeAgo(pub):''].filter(Boolean).join(' · ')}</div>
          </div>
        </div>`;
      card.addEventListener('click', () => openVideo(id, v));
      grid.appendChild(card);
    });
  }

  // ── HOME ──────────────────────────────────────────────────────
  async function goHome() {
    document.getElementById('searchBox').value = '';
    document.title = 'ViewTube';
    document.getElementById('navHome')?.classList.add('active');
    skeletons();
    lastAction = goHome;
    try {
      const d = await yt(
        `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&maxResults=24&regionCode=US&key=${API_KEY}`
      );
      render(d.items || []);
    } catch(e) {
      showErr(e.message, goHome);
    }
  }

  // ── SEARCH ────────────────────────────────────────────────────
  function doSearch(e) {
    e.preventDefault();
    const q = document.getElementById('searchBox').value.trim();
    if (q) runQuery(q);
  }

  async function runQuery(q) {
    document.getElementById('searchBox').value = q;
    document.title = `${q} — ViewTube`;
    skeletons();
    const action = () => runQuery(q);
    lastAction = action;
    try {
      const sd = await yt(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=24&order=relevance&key=${API_KEY}`
      );
      const items = sd.items || [];
      const ids = items.map(i=>i.id?.videoId).filter(Boolean).join(',');
      let statMap = {};
      if (ids) {
        const vd = await yt(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${API_KEY}`);
        (vd.items||[]).forEach(v => { statMap[v.id] = v.statistics; });
      }
      const enriched = items.map(i => ({
        ...i,
        id: i.id?.videoId,
        statistics: statMap[i.id?.videoId] || {}
      }));
      render(enriched, `Search results for "${q}"`);
    } catch(e) {
      showErr(e.message, action);
    }
  }

  // ── VIDEO MODAL ───────────────────────────────────────────────
  async function openVideo(videoId, videoData) {
    if (!videoId) return;
    currentVideoId = videoId;
    const sn = videoData.snippet || {};
    const st = videoData.statistics || {};
    const chan = sn.channelTitle || '';
    const bg = aColor(chan);
    const pubDate = sn.publishedAt
      ? new Date(sn.publishedAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})
      : '';

    document.getElementById('mTitle').textContent = sn.title || '';
    document.getElementById('mDesc').textContent = sn.description || 'No description.';
    document.getElementById('mDesc').classList.remove('open');
    document.getElementById('mStats').textContent = [fmtViews(st.viewCount),pubDate].filter(Boolean).join(' · ');
    document.getElementById('likeLabel').textContent = st.likeCount ? fmtN(st.likeCount) : 'Like';
    document.getElementById('mChan').innerHTML = `
      <div class="chan-av" style="background:${bg}">${ini(chan)}</div>
      <div>
        <div class="chan-name">${chan}</div>
        <div class="chan-subs" id="chanSubs">Loading…</div>
      </div>
      <button class="sub-btn">Subscribe</button>`;

    document.getElementById('playerBox').innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0"
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
        allowfullscreen></iframe>`;

    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Enrich async
    try {
      const d = await yt(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`);
      const item = d.items?.[0];
      if (item) {
        const s = item.statistics;
        document.getElementById('mTitle').textContent = item.snippet.title;
        document.getElementById('mDesc').textContent = item.snippet.description || 'No description.';
        document.getElementById('likeLabel').textContent = s.likeCount ? fmtN(s.likeCount) : 'Like';
        document.getElementById('mStats').textContent = [fmtViews(s.viewCount),pubDate].filter(Boolean).join(' · ');
        if (item.snippet.channelId) {
          const cd = await yt(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${item.snippet.channelId}&key=${API_KEY}`);
          const ch = cd.items?.[0];
          const el = document.getElementById('chanSubs');
          if (el) el.textContent = ch?.statistics?.subscriberCount ? fmtN(ch.statistics.subscriberCount)+' subscribers' : '';
        }
      }
    } catch(_) {}
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('playerBox').innerHTML = '';
    document.body.style.overflow = '';
    currentVideoId = '';
  }
  function overlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }
  document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeSettings(); } });

  function shareVideo() {
    const url = `https://youtu.be/${currentVideoId}`;
    if (navigator.share) navigator.share({url});
    else navigator.clipboard.writeText(url).then(()=>alert('Link copied!\n'+url));
  }
  function openOnYT() {
    window.open(`https://www.youtube.com/watch?v=${currentVideoId}`,'_blank');
  }
</script>
</body>
</html>
